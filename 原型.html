<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 智能问答系统 - 原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; }

/* Login */
.login-page { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.login-card { background: #fff; padding: 40px; border-radius: 12px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.login-card h1 { text-align: center; margin-bottom: 8px; font-size: 22px; color: #1a1a2e; }
.login-card .sub { text-align: center; margin-bottom: 30px; font-size: 13px; color: #999; }
.login-card label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
.login-card input, .login-card select { width: 100%; padding: 10px 12px; margin-bottom: 18px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.login-card input:focus { outline: none; border-color: #409eff; }
.login-card .btn { width: 100%; padding: 12px; background: #409eff; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
.login-card .btn:hover { background: #337ecc; }
.login-card .link { text-align: center; margin-top: 16px; font-size: 13px; color: #409eff; cursor: pointer; }
.login-card .link:hover { text-decoration: underline; }

/* Layout */
.app { display: none; height: 100vh; }
.sidebar { width: 220px; background: #1e1e2d; color: #a2a3b7; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
.sidebar .logo { padding: 20px; font-size: 18px; font-weight: 700; color: #fff; border-bottom: 1px solid #2a2a3d; }
.sidebar .logo span { font-size: 12px; color: #409eff; display: block; }
.sidebar nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.sidebar nav .group { padding: 12px 20px 4px; font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 1px; }
.sidebar nav .item { padding: 12px 20px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: all .2s; border-left: 3px solid transparent; }
.sidebar nav .item:hover { background: #252540; color: #e0e0e0; }
.sidebar nav .item.active { background: #252540; color: #409eff; border-left-color: #409eff; }
.sidebar .user-info { padding: 16px 20px; border-top: 1px solid #2a2a3d; display: flex; align-items: center; gap: 10px; }
.sidebar .user-info .avatar { width: 36px; height: 36px; border-radius: 50%; background: #409eff; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
.sidebar .user-info .name { font-size: 13px; color: #ccc; }
.sidebar .user-info .logout { margin-left: auto; font-size: 12px; color: #999; cursor: pointer; }

.main { margin-left: 220px; display: flex; flex-direction: column; height: 100vh; flex: 1; min-width: 0; }
.header { background: #fff; padding: 16px 28px; font-size: 18px; font-weight: 600; border-bottom: 1px solid #eee; display: flex; align-items: center; flex-shrink: 0; }
.content { flex: 1; padding: 24px 28px; overflow-y: auto; min-width: 0; }

/* Cards */
.stats { display: flex; gap: 20px; margin-bottom: 24px; }
.stat-card { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.stat-card .num { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.stat-card .label { font-size: 13px; color: #999; }

.panel { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 20px; }
.panel .panel-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
.panel .panel-body { padding: 20px; }

/* Tables */
table { width: 100%; border-collapse: collapse; }
thead th { background: #fafafa; padding: 12px 16px; text-align: left; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
tbody td { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
tbody tr:hover { background: #fafbfc; }

/* Buttons & Tags */
.btn { display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
.btn-primary { background: #409eff; color: #fff; }
.btn-primary:hover { background: #337ecc; }
.btn-success { background: #67c23a; color: #fff; }
.btn-danger { background: #f56c6c; color: #fff; }
.btn-default { background: #fff; color: #606266; border: 1px solid #ddd; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; }
.tag-success { background: #e8f5e9; color: #4caf50; }
.tag-warning { background: #fff3e0; color: #ff9800; }
.tag-danger { background: #ffebee; color: #f44336; }
.tag-info { background: #e3f2fd; color: #2196f3; }
.tag-default { background: #f5f5f5; color: #999; }

/* Q&A */
.qa-container { display: flex; flex-direction: column; height: calc(100vh - 120px); }
.qa-messages { flex: 1; overflow-y: auto; padding: 10px 0; }
.qa-message { margin-bottom: 20px; display: flex; gap: 12px; }
.qa-message.user { flex-direction: row-reverse; }
.qa-message .bubble { max-width: 75%; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
.qa-message.user .bubble { background: #409eff; color: #fff; border-bottom-right-radius: 4px; }
.qa-message.bot .bubble { background: #f0f2f5; border-bottom-left-radius: 4px; }
.qa-message.bot .sources { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 12px; color: #888; }
.qa-input-area { background: #fff; border-top: 1px solid #eee; padding: 16px 0; display: flex; gap: 12px; }
.qa-input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.qa-input-area input:focus { outline: none; border-color: #409eff; }
.qa-input-area .btn { padding: 12px 24px; border-radius: 8px; }

/* KG */
.kg-canvas { position: relative; width: 100%; height: 480px; background: #fafbfc; border: 1px solid #eee; border-radius: 8px; overflow: hidden; cursor: grab; user-select: none; }
.kg-canvas:active { cursor: grabbing; }
.kg-canvas svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.kg-canvas svg line { stroke: #bbb; stroke-width: 1.5; }
.kg-canvas svg polygon { fill: #bbb; }
.kg-node { position: absolute; width: 90px; height: 90px; margin-left: -45px; margin-top: -45px; background: #fff; border: 2px solid #409eff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #1a1a2e; cursor: grab; text-align: center; line-height: 1.4; box-shadow: 0 2px 8px rgba(64,158,255,.18); z-index: 2; transition: box-shadow .15s; }
.kg-node:hover { box-shadow: 0 4px 16px rgba(64,158,255,.35); border-color: #2563eb; z-index: 3; }
.kg-node.dragging { cursor: grabbing; box-shadow: 0 6px 24px rgba(64,158,255,.45); z-index: 4; }
.kg-legend { position: absolute; bottom: 12px; left: 16px; font-size: 12px; color: #999; z-index: 1; pointer-events: none; }
.kg-detail-popup { position: absolute; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 16px; font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,.12); z-index: 10; min-width: 180px; pointer-events: auto; }
.kg-detail-popup h4 { margin-bottom: 6px; color: #409eff; }
.kg-detail-popup p { margin-bottom: 4px; color: #666; font-size: 12px; }
.kg-detail-popup .close-btn { position: absolute; top: 6px; right: 10px; cursor: pointer; color: #999; font-size: 16px; }

/* Config */
.config-form label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 600; }
.config-form input, .config-form select { width: 300px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
.config-form input:focus { outline: none; border-color: #409eff; }

/* Misc */
.page { display: none; }
.page.active { display: block; }
.empty { text-align: center; padding: 60px 0; color: #bbb; font-size: 14px; }
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.search-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; width: 240px; font-size: 13px; }
.search-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; justify-content: space-between; }
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
.pagination span { padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 13px; }
.pagination span.active { background: #409eff; color: #fff; border-color: #409eff; }

.chart-placeholder { background: #f5f7fa; border-radius: 8px; height: 200px; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; }

/* Conversation sidebar */
.qa-layout { display: flex; gap: 20px; height: calc(100vh - 120px); }
.conv-list { width: 240px; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; flex-direction: column; }
.conv-list .conv-header { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-weight: 600; display: flex; justify-content: space-between; }
.conv-list .conv-items { flex: 1; overflow-y: auto; }
.conv-list .conv-item { padding: 12px 16px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f8f8f8; }
.conv-list .conv-item:hover { background: #f5f7fa; }
.conv-list .conv-item.active { background: #ecf5ff; color: #409eff; }
.qa-main { flex: 1; display: flex; flex-direction: column; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; padding: 28px; border-radius: 10px; width: 480px; box-shadow: 0 12px 48px rgba(0,0,0,.2); }
.modal h3 { margin-bottom: 20px; font-size: 17px; }
.modal label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 600; }
.modal input, .modal select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 14px; }
.modal .btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid #e8e8e8; margin-bottom: 20px; }
.tabs .tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
.tabs .tab:hover { color: #409eff; }
.tabs .tab.active { color: #409eff; border-bottom-color: #409eff; font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Prompt template textarea */
.prompt-editor { width: 100%; min-height: 100px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: 'Consolas','Microsoft YaHei',monospace; resize: vertical; }
.prompt-editor:focus { outline: none; border-color: #409eff; }
.rebuild-banner { background: #fff7e6; border: 1px solid #ffd591; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.rebuild-banner .warn-text { font-size: 14px; color: #d46b08; }
.rebuild-banner .warn-text b { color: #d4380d; }
</style>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <h1>RAG 智能问答系统</h1>
    <div class="sub">基于私有知识库的企业级问答平台</div>
    <label>用户名</label>
    <input type="text" id="loginUser" placeholder="请输入用户名" value="admin">
    <label>密码</label>
    <input type="password" id="loginPwd" placeholder="请输入密码" value="123456">
    <label>角色</label>
    <select id="loginRole">
      <option value="admin">管理员</option>
      <option value="user">普通用户</option>
    </select>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="link" onclick="showRegister()">还没有账号？立即注册</div>
  </div>
</div>

<!-- ==================== REGISTER MODAL ==================== -->
<div id="registerModal" class="modal-overlay">
  <div class="modal">
    <h3>用户注册</h3>
    <label>用户名</label>
    <input type="text" id="regUser" placeholder="请输入用户名">
    <label>密码</label>
    <input type="password" id="regPwd" placeholder="请输入密码">
    <label>确认密码</label>
    <input type="password" id="regPwd2" placeholder="请再次输入密码">
    <div class="btns">
      <button class="btn btn-default" onclick="hideRegister()">取消</button>
      <button class="btn btn-primary" onclick="doRegister()">注册</button>
    </div>
  </div>
</div>

<!-- ==================== MAIN APP ==================== -->
<div id="app" class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">RAG 问答系统<span>知识库智能问答平台</span></div>
    <nav id="navMenu"></nav>
    <div class="user-info">
      <div class="avatar" id="avatarLetter">A</div>
      <span class="name" id="currentUserName">admin</span>
      <span class="logout" onclick="doLogout()">退出</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header" id="pageTitle">工作台</div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<script>
let currentRole = 'admin';
let currentUser = 'admin';

// ============ NAVIGATION ============
const adminMenu = [
  { group: '主菜单', items: [
    { id: 'dashboard', label: '工作台', icon: '📊' },
    { id: 'knowledge', label: '知识库管理', icon: '📁' },
    { id: 'graph', label: '知识图谱', icon: '🔗' },
  ]},
  { group: '管理', items: [
    { id: 'users', label: '用户管理', icon: '👥' },
    { id: 'history', label: '问答历史', icon: '📋' },
    { id: 'model', label: '模型管理', icon: '🤖' },
    { id: 'config', label: '系统配置', icon: '⚙️' },
  ]},
];

const userMenu = [
  { group: '功能', items: [
    { id: 'qa', label: '智能问答', icon: '💬' },
    { id: 'myhistory', label: '问答历史', icon: '📋' },
  ]},
];

function buildNav(menu) {
  let h = '';
  menu.forEach(g => {
    h += `<div class="group">${g.group}</div>`;
    g.items.forEach(item => {
      h += `<div class="item" data-page="${item.id}" onclick="navigate('${item.id}')">${item.icon} ${item.label}</div>`;
    });
  });
  return h;
}

function navigate(page) {
  document.querySelectorAll('#navMenu .item').forEach(el => el.classList.remove('active'));
  const target = document.querySelector(`#navMenu .item[data-page="${page}"]`);
  if (target) target.classList.add('active');
  renderPage(page);
}

function renderPage(page) {
  const title = document.getElementById('pageTitle');
  const content = document.getElementById('pageContent');
  switch(page) {
    case 'dashboard': title.innerText = '工作台'; content.innerHTML = renderDashboard(); break;
    case 'knowledge': title.innerText = '知识库管理'; content.innerHTML = renderKnowledge(); break;
    case 'graph': title.innerText = '知识图谱管理'; content.innerHTML = renderGraph(); setTimeout(() => { kgInitGraph(); kgSetupCanvasEvents(); }, 50); break;
    case 'users': title.innerText = '用户管理'; content.innerHTML = renderUsers(); break;
    case 'history': title.innerText = '问答历史（全局）'; content.innerHTML = renderHistory(); break;
    case 'model': title.innerText = '模型与 API 管理'; content.innerHTML = renderModel(); break;
    case 'config': title.innerText = '系统配置'; content.innerHTML = renderConfig(); break;
    case 'qa': title.innerText = '智能问答'; content.innerHTML = renderQA(); break;
    case 'myhistory': title.innerText = '我的问答历史'; content.innerHTML = renderMyHistory(); break;
  }
}

// ============ LOGIN / REGISTER ============
function doLogin() {
  currentUser = document.getElementById('loginUser').value || 'admin';
  currentRole = document.getElementById('loginRole').value;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const menu = currentRole === 'admin' ? adminMenu : userMenu;
  document.getElementById('navMenu').innerHTML = buildNav(menu);
  document.getElementById('currentUserName').innerText = currentUser;
  document.getElementById('avatarLetter').innerText = currentUser.charAt(0).toUpperCase();
  const firstPage = currentRole === 'admin' ? 'dashboard' : 'qa';
  navigate(firstPage);
}

function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPwd').value = '';
}

function showRegister() { document.getElementById('registerModal').classList.add('show'); }
function hideRegister() { document.getElementById('registerModal').classList.remove('show'); }
function doRegister() {
  alert('注册成功！请登录');
  hideRegister();
  document.getElementById('loginUser').value = document.getElementById('regUser').value;
}
</script>

<script>
// ============ PAGE RENDERERS ============

function renderDashboard() {
  return `
    <div class="stats">
      <div class="stat-card"><div class="num">127</div><div class="label">文档总数</div></div>
      <div class="stat-card"><div class="num">96.2%</div><div class="label">解析成功率</div></div>

            <tr><td>DeepSeek API</td><td><span class="tag tag-success">正常</span></td></tr>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderKnowledge() {
  return `
    <div class="toolbar">
      <div class="search-bar">
        <input placeholder="搜索文档名称...">
        <select><option>全部类型</option><option>PDF</option><option>DOCX</option><option>TXT</option></select>
        <select><option>全部状态</option><option>已完成</option><option>解析中</option><option>待解析</option><option>解析失败</option></select>
        <button class="btn btn-default">搜索</button>
      </div>
      <div>
        <button class="btn btn-primary" onclick="alert('模拟：打开文件选择对话框，支持 PDF/DOCX/TXT 拖拽上传与批量上传')">+ 上传文档</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">文档列表</div>
      <div class="panel-body">
        <table>
          <thead><tr><th>文件名</th><th>版本</th><th>类型</th><th>大小</th><th>分类</th><th>解析状态</th><th>上传时间</th><th>操作</th></tr></thead>

// ============ KG Interactive Graph Engine ============
let kgNodes = [];
let kgEdges = [];
let kgScale = 1;
let kgPanX = 0, kgPanY = 0;
let kgDragNode = null;
let kgDragPan = null;
let kgPopup = null;

function kgInitGraph() {
  const canvas = document.getElementById('kgCanvas');
  if (!canvas) return;
  kgPopup = document.createElement('div');
  kgPopup.className = 'kg-detail-popup';
  kgPopup.style.display = 'none';
  canvas.appendChild(kgPopup);

  // Clear old nodes
  canvas.querySelectorAll('.kg-node').forEach(el => el.remove());

  // Define graph data
  kgNodes = [
    { id: 'ds', label: '数据安全', x: 350, y: 80, type: '概念', doc: '企业安全管理制度', desc: '涵盖访问控制、加密传输、审计日志等安全策略' },
    { id: 'ac', label: '访问控制', x: 150, y: 220, type: '概念', doc: '企业安全管理制度', desc: '基于RBAC的细粒度权限管控' },
    { id: 'enc', label: '加密传输', x: 520, y: 210, type: '技术', doc: '企业安全管理制度', desc: '采用SSL/TLS协议保障传输安全' },
    { id: 'perm', label: '权限分级', x: 80, y: 350, type: '概念', doc: '企业安全管理制度', desc: '公开/内部/机密/绝密四级分类' },
    { id: 'ssl', label: 'SSL/TLS', x: 460, y: 360, type: '技术', doc: '项目开发流程规范', desc: '安全传输层协议，用于数据加密' },
    { id: 'audit', label: '审计日志', x: 680, y: 170, type: '概念', doc: '企业安全管理制度', desc: '记录所有数据操作，保留至少6个月' },
    { id: 'oplog', label: '操作记录', x: 650, y: 330, type: '概念', doc: '企业安全管理制度', desc: '用户行为留痕，支持事后追溯' },
  ];
  kgEdges = [
    { from: 'ds', to: 'ac', label: '包含' },
    { from: 'ds', to: 'enc', label: '包含' },
    { from: 'ds', to: 'audit', label: '包含' },
    { from: 'ac', to: 'perm', label: '依赖' },
    { from: 'enc', to: 'ssl', label: '依赖' },
    { from: 'audit', to: 'oplog', label: '包含' },
  ];

  kgScale = 1;
  kgPanX = 0;
  kgPanY = 0;
  kgDraw();
}

function kgDraw() {
  const canvas = document.getElementById('kgCanvas');
  if (!canvas) return;
  // Remove old node elements
  canvas.querySelectorAll('.kg-node').forEach(el => el.remove());

  // Create nodes
  kgNodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'kg-node';
    el.style.left = (n.x * kgScale + kgPanX) + 'px';
    el.style.top = (n.y * kgScale + kgPanY) + 'px';
    el.style.transform = 'scale(' + kgScale + ')';
    el.style.transformOrigin = 'center center';
    el.textContent = n.label;
    el.dataset.nodeId = n.id;

    el.addEventListener('mousedown', (e) => kgNodeMouseDown(e, n));
    el.addEventListener('click', (e) => { e.stopPropagation(); kgNodeClick(e, n); });
    canvas.appendChild(el);
  });

  // Draw edges via SVG
  const svg = document.getElementById('kgSvg');
  if (!svg) return;
  let lines = '';
  kgEdges.forEach(edge => {
    const f = kgNodes.find(n => n.id === edge.from);
    const t = kgNodes.find(n => n.id === edge.to);
    if (!f || !t) return;
    const x1 = f.x * kgScale + kgPanX;
    const y1 = f.y * kgScale + kgPanY;
    const x2 = t.x * kgScale + kgPanX;
    const y2 = t.y * kgScale + kgPanY;
    // Arrow
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const arrowLen = 10;
    const ax = x2 - Math.cos(angle) * 38 * kgScale;
    const ay = y2 - Math.sin(angle) * 38 * kgScale;
    const ax1 = ax - Math.cos(angle - 0.5) * arrowLen;
    const ay1 = ay - Math.sin(angle - 0.5) * arrowLen;
    const ax2 = ax - Math.cos(angle + 0.5) * arrowLen;
    const ay2 = ay - Math.sin(angle + 0.5) * arrowLen;
    lines += `<line x1="${x1}" y1="${y1}" x2="${ax}" y2="${ay}" />`;
    lines += `<polygon points="${ax},${ay} ${ax1},${ay1} ${ax2},${ay2}" />`;
    // Edge label
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2 - 8;
    lines += `<text x="${mx}" y="${my}" text-anchor="middle" font-size="11" fill="#999">${edge.label}</text>`;
  });
  svg.innerHTML = lines;
}

// ----- Node Drag -----
function kgNodeMouseDown(e, node) {
  e.stopPropagation();
  e.preventDefault();
  kgDragNode = { node, sx: e.clientX, sy: e.clientY, ox: node.x, oy: node.y };
  document.addEventListener('mousemove', kgNodeMouseMove);
  document.addEventListener('mouseup', kgNodeMouseUp);
}

function kgNodeMouseMove(e) {
  if (!kgDragNode) return;
  const dx = (e.clientX - kgDragNode.sx) / kgScale;
  const dy = (e.clientY - kgDragNode.sy) / kgScale;
  kgDragNode.node.x = kgDragNode.ox + dx;
  kgDragNode.node.y = kgDragNode.oy + dy;
  kgDraw();
}

function kgNodeMouseUp() {
  if (kgDragNode) {
    kgDragNode = null;
    kgDraw();
  }
  document.removeEventListener('mousemove', kgNodeMouseMove);
  document.removeEventListener('mouseup', kgNodeMouseUp);
}

// ----- Node Click (Detail Popup) -----
function kgNodeClick(e, node) {
  const canvas = document.getElementById('kgCanvas');
  if (!canvas) return;
  kgPopup.style.display = 'block';
  kgPopup.style.left = (e.clientX - canvas.getBoundingClientRect().left + 20) + 'px';
  kgPopup.style.top = (e.clientY - canvas.getBoundingClientRect().top - 20) + 'px';
  kgPopup.innerHTML = '<span class="close-btn" onclick="this.parentElement.style.display=\'none\'">&times;</span>' +
    '<h4>' + node.label + '</h4>' +
    '<p><b>类型：</b>' + node.type + '</p>' +
    '<p><b>来源文档：</b>' + node.doc + '</p>' +
    '<p><b>描述：</b>' + (node.desc || '—') + '</p>';
}

// ----- Canvas Pan (drag empty space) -----
function kgCanvasMouseDown(e) {
  if (e.target.closest('.kg-node') || e.target.closest('.kg-detail-popup')) return;
  const canvas = document.getElementById('kgCanvas');
  kgDragPan = { sx: e.clientX, sy: e.clientY, ox: kgPanX, oy: kgPanY };
  canvas.style.cursor = 'grabbing';
  document.addEventListener('mousemove', kgCanvasMouseMove);
  document.addEventListener('mouseup', kgCanvasMouseUp);
}

function kgCanvasMouseMove(e) {
  if (!kgDragPan) return;
  kgPanX = kgDragPan.ox + (e.clientX - kgDragPan.sx);
  kgPanY = kgDragPan.oy + (e.clientY - kgDragPan.sy);
  kgDraw();
}

function kgCanvasMouseUp() {
  if (kgDragPan) {
    kgDragPan = null;
    const canvas = document.getElementById('kgCanvas');
    if (canvas) canvas.style.cursor = 'grab';
  }
  document.removeEventListener('mousemove', kgCanvasMouseMove);
  document.removeEventListener('mouseup', kgCanvasMouseUp);
}

// ----- Wheel Zoom -----
function kgCanvasWheel(e) {
  e.preventDefault();
  const canvas = document.getElementById('kgCanvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldScale = kgScale;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  kgScale = Math.max(0.3, Math.min(2.5, kgScale * delta));

  // Zoom toward mouse position
  kgPanX = mx - (mx - kgPanX) * (kgScale / oldScale);
  kgPanY = my - (my - kgPanY) * (kgScale / oldScale);
  kgDraw();
}

// ----- Canvas Click (close popup) -----
function kgCanvasClick(e) {
  if (!e.target.closest('.kg-node') && !e.target.closest('.kg-detail-popup')) {
    if (kgPopup) kgPopup.style.display = 'none';
  }
}

// ----- Search -----
function kgSearch() {
  const q = (document.getElementById('kgSearchInput')?.value || '').toLowerCase();
  if (!q) { alert('请输入搜索关键词'); return; }
  const found = kgNodes.find(n => n.label.toLowerCase().includes(q));
  if (found) {
    // Center on the found node
    const canvas = document.getElementById('kgCanvas');
    if (canvas) {
      const rect = canvas.getBoundingClientRect();
      kgPanX = rect.width / 2 - found.x * kgScale;
      kgPanY = rect.height / 2 - found.y * kgScale;
      kgDraw();
    }
    alert('找到实体：' + found.label + '（已居中显示）');
  } else {
    alert('未找到匹配实体');
  }
}

// Hook canvas events via delegation on the content area
function kgSetupCanvasEvents() {
  const canvas = document.getElementById('kgCanvas');
  if (!canvas) return;
  canvas.addEventListener('mousedown', kgCanvasMouseDown);
  canvas.addEventListener('click', kgCanvasClick);
  canvas.addEventListener('wheel', kgCanvasWheel, { passive: false });
}

// Model tab switcher
function switchModelTab(tabName) {
  document.querySelectorAll('#modelTabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const tabs = document.querySelectorAll('#modelTabs .tab');
  const tabMap = { 'providers': 0, 'chat': 1, 'embedding': 2, 'prompt': 3 };
  if (tabs[tabMap[tabName]]) tabs[tabMap[tabName]].classList.add('active');
  const content = document.getElementById('tab-' + tabName);
  if (content) content.classList.add('active');
}
